<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <style>
        body {
            background-image: url("photo001.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: #fff;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
            min-height: 100vh;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        h1 {
            font-size: 40px;
        }

        p {
            color: #ddd;
            max-width: 650px;
            margin: 20px auto;
            line-height: 1.8;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(2, 320px);
            justify-content: center;
            gap: 40px 30px;
            margin-top: 30px;
        }

        .category-item {
            text-align: center;
        }

        .blog-image img {
            width: 320px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            opacity: 0.95;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .category-box {
            margin-top: 15px;
        }

        .category-box a {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            background: rgba(30, 60, 114, 0.85);
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 20px;
        }

        .category-box a:hover {
            background: rgba(106, 17, 203, 0.9);
        }

        @media (max-width: 700px) {
            .categories {
                grid-template-columns: 1fr;
            }

            .blog-image img {
                width: 90%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <h1>Hello, I'm Haruharu</h1>
    <p>IT × Language × Photography</p>

    <p>
        こんにちは、Haruharuです。英語・中国語・韓国語を学びながら、人とつながることを大切にしています。
        ITの分野ではクラウドやネットワークに興味があり、日々理解を深めています。
        また、写真を通して日常の一瞬や美しい景色を切り取るのが好きです。
    </p>

    <h2>Blog Categories</h2>

    <div class="categories">

        <div class="category-item">
            <div class="blog-image">
                <a href="english.html">
                    <img src="photo002.png" alt="English Book">
                </a>
            </div>

            <div class="category-box">
                <a href="english.html">English Blog</a>
            </div>
        </div>

        <div class="category-item">
            <div class="blog-image">
                <a href="chinese.html">
                    <img src="photo003.png" alt="Chinese Book">
                </a>
            </div>

            <div class="category-box">
                <a href="chinese.html">Chinese Blog</a>
            </div>
        </div>

        <div class="category-item">
            <div class="blog-image">
                <a href="korean.html">
                    <img src="photo004.png" alt="Korean Book">
                </a>
            </div>

            <div class="category-box">
                <a href="korean.html">Korean Blog</a>
            </div>
        </div>

        <div class="category-item">
            <div class="blog-image">
                <a href="it.html">
                    <img src="photo005.png" alt="IT Blog">
                </a>
            </div>

            <div class="category-box">
                <a href="it.html">IT Blog</a>
            </div>
        </div>

    </div>
</body>
</html>
